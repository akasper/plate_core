# PLATE canonical label registry.
# Mutable planning state such as status, priority, owner, rank, target date, iteration, and release target belongs in GitHub Projects fields.

- name: "Feedback Response"
  color: "e4e669"
  description: "Issue or PR type: PLATES-generated task or resulting PR that addresses third-party agent review feedback. Auto-created by plates-address-pr-feedback.yml."

- name: "Bug"
  color: "d73a4a"
  description: "Issue or PR type: defect, regression, or incorrect behavior."
- name: "Feature"
  color: "0e8a16"
  description: "Issue or PR type: user-visible or operational capability change."
- name: "Epic"
  color: "5319e7"
  description: "Issue type: parent planning object that owns a stable Epic: short-name label."
- name: "Documentation"
  color: "0075ca"
  description: "PR type: documentation-only change."
- name: "Research"
  color: "fbca04"
  description: "Issue type: research, comparison, decision preparation, or ADR input."
- name: "Audit"
  color: "b60205"
  description: "Issue type: audit finding or drift correction."
- name: "Migration"
  color: "c5def5"
  description: "Issue type: existing-project PLATE adoption task."

- name: "Design"
  color: "f9d0c4"
  description: "Issue type: UX design, architecture design, API contract, data model, or information design."
- name: "Question"
  color: "d4c5f9"
  description: "Issue type: information goal that captures an unknown and closes with documented answer artifacts."
- name: "Spike"
  color: "c2e0c6"
  description: "Issue type: time-boxed investigation with a defined question and hard timebox. Produces an answer or explicit discard decision."

- name: "area:product"
  color: "bfd4f2"
  description: "Stable area: product intent, scope, or behavior."
- name: "area:frontend"
  color: "bfd4f2"
  description: "Stable area: frontend or user interface."
- name: "area:backend"
  color: "bfd4f2"
  description: "Stable area: backend, API, or server logic."
- name: "area:infra"
  color: "bfd4f2"
  description: "Stable area: infrastructure, deployment, or operations."
- name: "area:docs"
  color: "bfd4f2"
  description: "Stable area: documentation, wiki, or release notes."
- name: "area:tests"
  color: "bfd4f2"
  description: "Stable area: tests, fixtures, recordings, or QA automation."
- name: "area:agent"
  color: "bfd4f2"
  description: "Stable area: agent rules, prompts, skills, or workflow automation."
- name: "area:security"
  color: "bfd4f2"
  description: "Stable area: security, secrets, auth, or permissions."
- name: "area:marketing"
  color: "bfd4f2"
  description: "Stable area: marketing site, public claims, analytics, or launch material."

- name: "risk:low"
  color: "0e8a16"
  description: "Low review burden and low release risk."
- name: "risk:medium"
  color: "fbca04"
  description: "Moderate review burden or operational caution."
- name: "risk:high"
  color: "d93f0b"
  description: "High review burden, user impact, migration risk, or rollback concern."
- name: "risk:critical"
  color: "b60205"
  description: "Critical release, security, compliance, data, or public-claim risk."

- name: "need:reproduction"
  color: "ededed"
  description: "Needs reproduction steps or a reproducible failing case."
- name: "need:decision"
  color: "ededed"
  description: "Needs a human product, technical, legal, or process decision."
- name: "need:tests"
  color: "ededed"
  description: "Needs test plan, regression coverage, or verification evidence."
- name: "need:docs"
  color: "ededed"
  description: "Needs documentation, CURRENT.md, wiki, release note, or claim update."
- name: "need:design"
  color: "ededed"
  description: "Needs UX, architecture, information design, or product design input."
- name: "need:security-review"
  color: "ededed"
  description: "Needs security, permission, secret, privacy, or abuse-risk review."
- name: "need:human-review"
  color: "ededed"
  description: "Needs explicit human review before progress or merge."
- name: "need:wiki-sync"
  color: "ededed"
  description: "Needs wiki synchronization or human review of wiki-sync output."
- name: "need:refinement"
  color: "ededed"
  description: "Stub issue created during planning; acceptance criteria and scope details are incomplete and require refinement before implementation starts."

- name: "auto-merge"
  color: "0e8a16"
  description: "Lightweight PR cleared for autonomous auto-merge when AUTONOMOUS_MODE is active."

- name: "no-issue"
  color: "ededed"
  description: "This PR does not resolve a tracked issue (chore, dependency bump, hotfix). Silences the issue-link check."

- name: "status:blocked"
  color: "b60205"
  description: "Feature issue has one or more open native GitHub blockers."
- name: "status:ready-to-work"
  color: "0e8a16"
  description: "Feature issue has no open native GitHub blockers and can be started by PLATES triggers."
- name: "no-guidance-update"
  color: "ededed"
  description: "PR closes a Question issue whose answer does not change operating guidance. Skips the AGENTS.md/skills.yml update check."

- name: "Epic: example"
  color: "5319e7"
  description: "Example epic traceability label; replace with project-specific Epic: short-name labels."
