name: Auto-merge lightweight PRs

# Triggered when a PR receives the 'auto-merge' label.
# Only merges if .github/AUTONOMOUS_MODE exists on the default branch,
# confirming that autonomous mode is intentionally active.
# The PR must still satisfy all branch protection rules before GitHub
# will complete the merge.

on:
  pull_request:
    types: [labeled]

jobs:
  auto-merge:
    if: github.event.label.name == 'auto-merge'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Check autonomous mode is active
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: '.github/AUTONOMOUS_MODE',
                ref: context.payload.repository.default_branch,
              });
              core.setOutput('active', 'true');
            } catch (e) {
              core.setOutput('active', 'false');
              core.warning('Autonomous mode is not active (.github/AUTONOMOUS_MODE not found). Skipping auto-merge.');
            }

      - name: Enable auto-merge
        if: steps.check.outputs.active == 'true'
        run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
