name: Question Handling

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  batch-open-questions:
    runs-on: ubuntu-latest
    steps:
      - name: Handle /question-batch slash command
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment?.body || '';
            const match = body.trim().match(/^\/question-batch(?:\s+(\d+))?$/i);
            if (!match) {
              core.info('Comment is not /question-batch; skipping.');
              return;
            }

            const requested = parseInt(match[1] || '10', 10);
            const limit = Number.isFinite(requested) ? Math.min(Math.max(requested, 1), 30) : 10;

            const [questionIssues, hashQuestionIssues] = await Promise.all([
              github.paginate(github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'Question',
                per_page: 100
              }),
              github.paginate(github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: '#question',
                per_page: 100
              })
            ]);

            const merged = [...questionIssues, ...hashQuestionIssues]
              .filter((item) => !item.pull_request)
              .reduce((map, item) => map.set(item.number, item), new Map());

            const openQuestions = [...merged.values()]
              .sort((a, b) => new Date(a.created_at) - new Date(b.created_at))
              .slice(0, limit);

            const rows = openQuestions.length > 0
              ? openQuestions.map((issue) => `| #${issue.number} | ${issue.title.replace(/\|/g, '\\|')} | @${issue.user.login} |`).join('\n')
              : '| — | No open Question issues found. | — |';

            const message = [
              `### Open Question batch (${openQuestions.length})`,
              '',
              '| Issue | Title | Author |',
              '|---|---|---|',
              rows,
              '',
              'Low-friction GitHub CLI follow-up:',
              '```bash',
              'gh issue list --state open --label "Question" --limit 30',
              'gh issue view <number>',
              'gh issue comment <number> --body "Answer: <summary>\\n\\nFollow-up: <links>"',
              '```'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });

