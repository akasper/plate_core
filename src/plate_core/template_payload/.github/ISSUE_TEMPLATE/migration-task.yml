name: Migration task
description: Track existing-project adoption work when moving a legacy repository into PLATE.
title: "[Migration]: "
labels:
  - Migration
body:
  - type: dropdown
    id: stage
    attributes:
      label: Migration stage
      options:
        - inventory
        - baseline
        - new-work enforcement
        - historical repair
        - cutover
        - completion
    validations:
      required: true
  - type: textarea
    id: affected_artifacts
    attributes:
      label: Affected legacy artifacts
      description: List legacy files, issues, workflows, docs, wiki pages, releases, or public claims involved.
    validations:
      required: true
  - type: textarea
    id: expected_plate_state
    attributes:
      label: Expected PLATE state
      description: What should be true after this migration task is complete?
    validations:
      required: true
  - type: textarea
    id: exception_or_risk
    attributes:
      label: Exceptions, risks, or rollback notes
      description: Document any temporary exception, owner, review date, or rollback plan.
    validations:
      required: false
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      placeholder: "- [ ] ..."
    validations:
      required: true
