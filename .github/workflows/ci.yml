name: CI
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

jobs:
  labels:
    name: Labels
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate PR type label
        uses: actions/github-script@v7
        with:
          script: |
            const prTypeLabels = ['Bug', 'Feature', 'Documentation', 'Feedback Response'];
            const target = context.payload.pull_request;

            if (!target) {
              core.setFailed('No pull request payload found.');
              return;
            }

            const labels = (target.labels || []).map((label) => typeof label === 'string' ? label : label.name);
            const matches = labels.filter((label) => prTypeLabels.includes(label));
            const forbidden = labels.filter((label) => /^status:|^priority:/.test(label));
            core.info(`Labels: ${labels.join(', ') || '(none)'}`);

            let failureMessage = null;

            if (forbidden.length > 0) {
              failureMessage = `Pull requests must not use planning state labels (${forbidden.join(', ')}). Use GitHub Projects fields instead.`;
            } else if (matches.length !== 1) {
              failureMessage = `Pull requests must have exactly one PR type label (${prTypeLabels.join(', ')}). Found: ${matches.join(', ') || '(none)'}.`;
            }

            if (failureMessage) {
              core.setFailed(failureMessage);
              return;
            }

            core.info('PR label rules passed.');

  test:
    needs: labels
    if: always() && (github.event_name != 'pull_request' || needs.labels.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: |
          set -euo pipefail
          export PYTHONPATH="$GITHUB_WORKSPACE/src"
          python -m unittest discover -s tests -p "test_*.py"

      - name: Install Copilot CLI
        run: |
          set -euo pipefail
          COPILOT_VERSION="1.0.54"
          curl -fsSL -o copilot-linux-x64.tar.gz "https://github.com/github/copilot-cli/releases/download/v${COPILOT_VERSION}/copilot-linux-x64.tar.gz"
          tar -xzf copilot-linux-x64.tar.gz
          chmod +x copilot
          sudo mv copilot /usr/local/bin/copilot
          copilot --version

      - name: Plugin install smoke test (workspace path)
        run: |
          set -euo pipefail
          copilot plugin install "$GITHUB_WORKSPACE"
          copilot plugin uninstall plate-core

      - name: Plugin install smoke test (GitHub repo source)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          copilot plugin install akasper/plate_core
          copilot plugin uninstall plate-core