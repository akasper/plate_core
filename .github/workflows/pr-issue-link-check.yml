name: PLATE PR Issue Link Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled, milestoned, demilestoned]

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  check-issue-links:
    runs-on: ubuntu-latest
    steps:
      - name: Check for linked issue
        uses: actions/github-script@v8
        with:
          script: |
            const pullRequest = context.payload.pull_request;
            const body = pullRequest?.body || '';
            const labels = (pullRequest?.labels || []).map((l) => l.name);

            if (!pullRequest) {
              core.info('No pull request payload found.');
              return;
            }

            // PRs explicitly labeled no-issue are exempt (dependency bumps, hotfixes, etc.)
            if (labels.includes('no-issue') || labels.includes('Feedback Response')) {
              core.info('PR is exempt from linked issue enforcement.');
              return;
            }

            // GitHub's native closing keywords (case-insensitive), optionally followed by a URL or #number
            const closingPattern = /\b(closes?|closed|fixe?s?|fixed|resolve[sd]?)\s+(#\d+|https?:\/\/github\.com\/[^\s]+\/issues\/\d+)/i;
            const hasClosingKeyword = closingPattern.test(body);
            const requiresIssue = labels.some((l) => ['Feature', 'Bug', 'Documentation'].includes(l));

            if (!requiresIssue) {
              core.info('PR type does not require linked issue enforcement.');
              return;
            }

            const linkedIssueNumbers = new Set();

            if (hasClosingKeyword) {
              core.info('Closing keyword found — linked issue will auto-close on merge.');
            }

            let cursor = null;
            do {
              const data = await github.graphql(
                `
                  query($owner: String!, $repo: String!, $cursor: String) {
                    repository(owner: $owner, name: $repo) {
                      issues(first: 100, after: $cursor, states: [OPEN, CLOSED]) {
                        nodes {
                          number
                          linkedPullRequests(first: 20) {
                            nodes {
                              number
                            }
                          }
                        }
                        pageInfo {
                          hasNextPage
                          endCursor
                        }
                      }
                    }
                  }
                `,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cursor,
                }
              );

              for (const issue of data.repository.issues.nodes) {
                if ((issue.linkedPullRequests?.nodes || []).some((pr) => pr.number === pullRequest.number)) {
                  linkedIssueNumbers.add(issue.number);
                }
              }

              cursor = data.repository.issues.pageInfo.hasNextPage
                ? data.repository.issues.pageInfo.endCursor
                : null;
            } while (cursor);

            if (linkedIssueNumbers.size > 0) {
              core.info(`Development sidebar linked issues found: ${Array.from(linkedIssueNumbers).join(', ')}`);
            }

            if (hasClosingKeyword || linkedIssueNumbers.size > 0) {
              core.info('Issue link requirement satisfied.');
              return;
            }

            const message = [
              '## ⚠️ No linked issue detected',
              '',
              'PLATE requires `Feature`, `Bug`, and issue-driven `Documentation` PRs to link at least one tracked issue.',
              '',
              'Accepted link methods:',
              '- `Closes #N` / `Fixes #N` / `Resolves #N` in the PR body when merge should close the issue',
              '- A GitHub Development sidebar link when the issue should stay open after the PR lands',
              '',
              '**This PR is labeled `Feature`, `Bug`, or `Documentation` and must link at least one issue.**',
              'Use `no-issue` only for true chores, maintenance, or other PRs that intentionally do not resolve tracked work.',
            ].join('\n');

            core.setFailed(message);
