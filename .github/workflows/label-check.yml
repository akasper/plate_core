name: PLATE Issue Label Check

on:
  issues:
    types: [opened, edited, labeled, unlabeled, reopened, milestoned, demilestoned]

permissions:
  contents: read
  issues: read

jobs:
  check-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PLATE issue label rules
        uses: actions/github-script@v8
        with:
          script: |
            const issueTypeLabels = ['Bug', 'Feature', 'Epic', 'Research', 'Design', 'Question', 'Audit', 'Migration', 'Feedback Response'];
            const requiresMilestone = ['Feature', 'Epic'];
            const issue = context.payload.issue;

            if (!issue) {
              core.info('No issue payload found.');
              return;
            }

            const labels = (issue.labels || []).map((label) => typeof label === 'string' ? label : label.name);
            const forbiddenPlanningLabels = labels.filter((label) => /^status:|^priority:/.test(label));
            const milestoneTitle = issue.milestone?.title || '(none)';
            core.info(`Labels: ${labels.join(', ') || '(none)'}`);
            core.info(`Milestone: ${milestoneTitle}`);

            if (forbiddenPlanningLabels.length > 0) {
              core.setFailed(`PLATE repositories should use GitHub Projects fields for planning state, not labels: ${forbiddenPlanningLabels.join(', ')}.`);
              return;
            }

            const matches = labels.filter((label) => issueTypeLabels.includes(label));
            if (matches.length !== 1) {
              core.setFailed(`Issues must have exactly one PLATE issue type label (${issueTypeLabels.join(', ')}). Found: ${matches.join(', ') || '(none)'}.`);
              return;
            }

            if (requiresMilestone.includes(matches[0]) && !issue.milestone) {
              core.setFailed(`${matches[0]} issues must be assigned to a GitHub milestone representing the Epic.`);
              return;
            }

            core.info('PLATE issue label rules passed.');
