name: PR Feedback Resolution Check

# Ensures auto-merge does not complete while actionable PR commentary is still
# open. This check fails when the PR has unresolved review threads or is still
# in CHANGES_REQUESTED state.

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]
  pull_request_review_thread:
    types: [resolved, unresolved]

permissions:
  contents: read
  pull-requests: read

jobs:
  feedback-resolution:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure review feedback is fully resolved
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request?.number;

            if (!prNumber) {
              core.info('No pull_request payload found; skipping.');
              return;
            }

            const unresolved = [];
            let reviewDecision = null;
            let cursor = null;

            do {
              const result = await github.graphql(
                `query($owner: String!, $repo: String!, $number: Int!, $cursor: String) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      reviewDecision
                      reviewThreads(first: 100, after: $cursor) {
                        nodes {
                          isResolved
                          isOutdated
                          comments(first: 1) {
                            nodes {
                              author {
                                login
                              }
                            }
                          }
                        }
                        pageInfo {
                          hasNextPage
                          endCursor
                        }
                      }
                    }
                  }
                }`,
                {
                  owner,
                  repo,
                  number: prNumber,
                  cursor,
                }
              );

              const pr = result.repository.pullRequest;
              reviewDecision = pr.reviewDecision;

              for (const thread of pr.reviewThreads.nodes) {
                if (!thread.isResolved && !thread.isOutdated) {
                  const author = thread.comments.nodes[0]?.author?.login || 'unknown';
                  unresolved.push(author);
                }
              }

              const pageInfo = pr.reviewThreads.pageInfo;
              cursor = pageInfo.hasNextPage ? pageInfo.endCursor : null;
            } while (cursor);

            if (reviewDecision === 'CHANGES_REQUESTED') {
              core.setFailed(
                'PR reviewDecision is CHANGES_REQUESTED. Address feedback and re-request review before merge.'
              );
              return;
            }

            if (unresolved.length > 0) {
              const sample = unresolved.slice(0, 8).join(', ');
              core.setFailed(
                `Found ${unresolved.length} unresolved active review thread(s). Resolve all threads before merge. Authors: ${sample}`
              );
              return;
            }

            core.info('All active review threads are resolved and no CHANGES_REQUESTED decision remains.');
