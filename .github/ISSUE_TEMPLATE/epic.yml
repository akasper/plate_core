name: Epic
description: Capture optional narrative or decision support for a GitHub milestone-backed epic.
title: "[Epic]: "
labels:
  - Epic
body:
  - type: markdown
    attributes:
      value: |
        GitHub Milestones are the canonical Epic container. Create or select the milestone first, then use this issue only when the Epic needs a durable narrative, design, or decision artifact in addition to the milestone itself.
  - type: input
    id: epic_milestone
    attributes:
      label: Epic milestone
      description: Name the GitHub milestone that represents this epic.
      placeholder: "Q3 onboarding"
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What durable product, operational, or business outcome should this epic produce?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and boundaries
      description: What is included, excluded, deferred, or explicitly out of scope?
    validations:
      required: true
  - type: textarea
    id: success
    attributes:
      label: Success criteria
      description: What will prove this epic is complete?
      placeholder: "- [ ] ..."
    validations:
      required: true
  - type: textarea
    id: child_features
    attributes:
      label: Expected child features
      description: Link existing child issues or list expected features to create.
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks, assumptions, and dependencies
      description: Identify significant risks, decisions, research, dependencies, or migration concerns.
    validations:
      required: false
  - type: checkboxes
    id: readiness
    attributes:
      label: PLATE epic readiness
      options:
        - label: This issue has or will be assigned to its GitHub milestone.
          required: true
        - label: Child features can be decomposed into testable issues.
          required: true
        - label: Success criteria are observable or auditable.
          required: true
